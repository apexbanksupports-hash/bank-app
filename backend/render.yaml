services:
  - type: web
    name: bank-backend
    env: node
    buildCommand: npm install && npx prisma generate && npx tsc
    startCommand: node dist/index.js
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: file:/data/dev.db
      - key: CORS_ORIGINS
        value: https://bank-frontend.vercel.app
      - key: SENDGRID_FROM_EMAIL
        value: noreply@apexbank.com
      - key: SENDGRID_FROM_NAME
        value: APEX BANK
      - key: SUPPORT_PHONE
        value: '+1 (302) 290-6516'
      - key: SUPPORT_EMAIL
        value: support@apexbank.com
      - key: LOGO_URL
        value: https://apexbank.com/logo.png
